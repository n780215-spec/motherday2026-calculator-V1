<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>天麗2026母親節特惠計算機</title>

<link rel="manifest" href="./manifest.json" />
<meta name="theme-color" content="#111827" />

<style>
:root{
  --bg:#f3f4f6;
  --card:#ffffff;
  --border:rgba(0,0,0,.08);
  --primary:#2563eb;

  --s-bg:#0b1220;
  --s-card:rgba(255,255,255,.08);
  --s-text:#fff;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:var(--bg);
  font-size:16px;
}

.wrapper{display:flex;align-items:flex-start}

.products{flex:1;padding:16px}

.product-card{
  background:var(--card);
  border:1px solid var(--border);
  padding:12px;
  margin-bottom:10px;
  border-radius:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.product-name{font-weight:900;font-size:15px}
.product-meta{font-size:13px;color:#666}

.qty-controls{display:flex;gap:8px;align-items:center}

.qty-btn{
  width:40px;height:40px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#fff;
  font-size:20px;
  font-weight:900;
  touch-action:manipulation;
}

.qty-btn.plus{
  background:var(--primary);
  color:white;
  border-color:var(--primary);
}

.qty-num{
  min-width:30px;
  text-align:center;
  font-weight:900;
}

/* 右側極簡統計 */
.summary{
  width:280px;
  background:var(--s-bg);
  color:var(--s-text);
  padding:16px;
  position:sticky;
  top:0;
  height:100vh;
}

.sbox{
  background:var(--s-card);
  padding:12px;
  border-radius:12px;
  margin-bottom:12px;
}

.sbox h4{margin:0 0 8px 0;font-size:14px;color:#ddd}
.big{font-size:18px;font-weight:900}

/* 下方完整明細 */
.detail-box{
  background:#fff;
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  margin-top:20px;
}
.detail-box h3{margin-top:0}

ul{padding-left:18px;margin:8px 0}
</style>
</head>
<body>

<div class="wrapper">

<div class="products">
<h2>🛍 商品選擇</h2>

<div id="productList"></div>

<!-- 🔻 完整明細 -->
<div class="detail-box">
<h3>📋 完整明細</h3>

<p>會員等級：<strong id="detailMember"></strong></p>
<p>會員費：NT$ <strong id="detailFee"></strong></p>
<p>商品金額：NT$ <strong id="detailAmount"></strong></p>
<p>總PV：<strong id="detailPV"></strong></p>

<h4>已選商品</h4>
<ul id="detailItems"></ul>

<h4>贈品明細</h4>
<ul id="detailGifts"></ul>

<p>回饋金：NT$ <strong id="detailCashback"></strong></p>
</div>

</div>

<!-- 🔹 右側極簡 -->
<div class="summary">

<div class="sbox">
<h4>商品金額</h4>
<div class="big">NT$ <span id="sumAmount">0</span></div>
</div>

<div class="sbox">
<h4>總PV</h4>
<div class="big"><span id="sumPV">0</span></div>
</div>

<div class="sbox">
<h4>升級建議</h4>
<div id="sumUpgrade">請加入商品</div>
</div>

</div>
</div>

<script>

// 會員
const members = [
 {name:"新會員", fee:1000, deduct:28001, rate:0.25},
 {name:"專員", fee:500, rate:0.25},
 {name:"主任", fee:500, rate:0.30},
 {name:"經理", fee:500, rate:0.35},
 {name:"寶石", fee:500, rate:0.37},
 {name:"鑽石", fee:500, rate:0.38},
 {name:"金鑽", fee:500, rate:0.39},
 {name:"顧問", fee:500, rate:0.40}
];

let selectedMember = members[1]; // 預設專員

// 商品
const products = [
 {name:"青春元素-F",price:1995,pv:1700},
 {name:"青春元素-L",price:1995,pv:1700},
 {name:"麗穩膳",price:3210,pv:2200},
 {name:"麗穩康",price:3210,pv:2200}
];

// 買8送1保健品
const buy8 = new Set(["青春元素-F","青春元素-L","麗穩膳","麗穩康"]);

// 贈品門檻（由小到大）
const giftRules = [
 {pv:19000,items:["2號 ×1"]},
 {pv:32000,items:["1號 ×1","9號 ×1"]},
 {pv:50000,items:["6A ×1","9號 ×1","12號 ×1"]},
];

const qtyMap={};

function getQty(i){return qtyMap[i]||0}
function setQty(i,v){v<=0?delete qtyMap[i]:qtyMap[i]=v}

function render(){
 const list=document.getElementById("productList");
 list.innerHTML="";
 products.forEach((p,i)=>{
   const card=document.createElement("div");
   card.className="product-card";

   const info=document.createElement("div");
   info.innerHTML=`<div class="product-name">${p.name}</div>
   <div class="product-meta">NT$ ${p.price} / PV ${p.pv}</div>`;

   const controls=document.createElement("div");
   controls.className="qty-controls";

   const minus=document.createElement("button");
   minus.className="qty-btn";
   minus.innerText="−";
   minus.type="button";
   minus.onclick=()=>changeQty(i,-1);

   const num=document.createElement("div");
   num.className="qty-num";
   num.id="qty"+i;
   num.innerText=getQty(i);

   const plus=document.createElement("button");
   plus.className="qty-btn plus";
   plus.type="button";
   plus.innerText="+";
   plus.onclick=()=>changeQty(i,1);

   controls.append(minus,num,plus);
   card.append(info,controls);
   list.append(card);
 });
}

function changeQty(i,d){
 setQty(i,getQty(i)+d);
 render();
 calculate();
}

function calculate(){
 let amount=0,pv=0;
 let items=[];
 let giftList=[];

 products.forEach((p,i)=>{
  const q=getQty(i);
  if(q>0){
   amount+=p.price*q;
   pv+=p.pv*q;
   items.push(`${p.name} ×${q}`);

   if(buy8.has(p.name)){
     const bonus=Math.floor(q/8);
     if(bonus>0){
       giftList.push(`${p.name} +${bonus}`);
     }
   }
  }
 });

 // PV門檻贈品
 let currentGift=null;
 for(const g of giftRules){
   if(pv>=g.pv) currentGift=g;
 }
 if(currentGift){
   giftList=giftList.concat(currentGift.items);
 }

 // 升級建議
 let next=null;
 for(const g of giftRules){
   if(pv<g.pv){ next=g; break;}
 }
 let upgradeText="已達最高門檻";
 if(pv===0) upgradeText="請加入商品";
 else if(next){
   upgradeText=`還差 ${next.pv-pv} PV → ${next.items.join("、")}`;
 }

 // 回饋
 let effectivePV = selectedMember.deduct ? Math.max(0,pv-selectedMember.deduct):pv;
 let cashback = Math.floor(effectivePV*selectedMember.rate);

 // 右側
 document.getElementById("sumAmount").innerText=amount;
 document.getElementById("sumPV").innerText=pv;
 document.getElementById("sumUpgrade").innerText=upgradeText;

 // 下方明細
 document.getElementById("detailMember").innerText=selectedMember.name;
 document.getElementById("detailFee").innerText=selectedMember.fee;
 document.getElementById("detailAmount").innerText=amount;
 document.getElementById("detailPV").innerText=pv;
 document.getElementById("detailCashback").innerText=cashback;

 const ul=document.getElementById("detailItems");
 ul.innerHTML="";
 items.forEach(i=>ul.innerHTML+=`<li>${i}</li>`);

 const ul2=document.getElementById("detailGifts");
 ul2.innerHTML="";
 giftList.forEach(g=>ul2.innerHTML+=`<li>${g}</li>`);
}

render();
calculate();

</script>
</body>
</html>
